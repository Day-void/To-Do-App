<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django Todo{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: #1e1e1e; 
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 1px;
        }

        .form-input, input[type="text"], input[type="date"], textarea, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #2d2d2d;
            border: 2px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: #bb86fc;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary { background: #bb86fc; color: #121212; }
        .btn-primary:hover { background: #d7b7fd; transform: translateY(-2px); }

        .btn-danger { background: #cf6679; color: #121212; }
        .btn-danger:hover { background: #ff7597; }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">        
        {% block content %}{% endblock %}
    </div>
</body>
</html>
