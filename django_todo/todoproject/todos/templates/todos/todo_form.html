{% extends 'todos/base.html' %}
{% block title %}Manage Todo{% endblock %}
{% block content %}
<h1>{% if form.instance.pk %}Edit{% else %}New{% endif %} Task</h1>
<form method="post">
    {% csrf_token %}
    <div class="dark-form">
        {{ form.as_p }}
    </div>
    <div style="margin-top: 25px; display: flex; gap: 10px;">
        <button type="submit" class="btn btn-primary">Save Task</button>
        <a href="{% url 'todo_list' %}" class="btn" style="background: #333; color: #eee;">Cancel</a>
    </div>
</form>
{% endblock %}
